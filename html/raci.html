<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RACI Matrix</title>
<script src="../data/data.js"></script>
<style>
  :root, [data-theme="dark"] {
    --bg-primary: #0f1923;
    --bg-secondary: #152232;
    --bg-tertiary: #1c2e42;
    --text-primary: #d8dee9;
    --text-secondary: #7b8da2;
    --border-color: #243447;
    --accent: #2f7bbf;
    --accent-hover: #3d8fd4;
    --accent-subtle: rgba(47, 123, 191, 0.10);
    --today-line: #e85d5d;
    --row-hover: rgba(47, 123, 191, 0.08);
    --progress-bg: rgba(255,255,255,0.10);
  }
  [data-theme="light"] {
    --bg-primary: #f4f6f9;
    --bg-secondary: #ffffff;
    --bg-tertiary: #e9edf2;
    --text-primary: #1a2332;
    --text-secondary: #5a6a7e;
    --border-color: #d0d7e0;
    --accent: #2468a8;
    --accent-hover: #1b5690;
    --accent-subtle: rgba(36, 104, 168, 0.08);
    --today-line: #d94444;
    --row-hover: rgba(36, 104, 168, 0.06);
    --progress-bg: rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .toolbar h1 {
    font-size: 18px;
    font-weight: 600;
    margin-right: auto;
    white-space: nowrap;
  }
  .toolbar h1 a {
    color: var(--text-secondary);
    text-decoration: none;
    margin-right: 8px;
    font-size: 16px;
  }
  .toolbar h1 a:hover { color: var(--text-primary); }

  .toolbar .search-box {
    display: flex;
    align-items: center;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 4px 10px;
  }
  .toolbar .search-box input {
    background: transparent;
    border: none;
    color: var(--text-primary);
    font-size: 13px;
    width: 160px;
    outline: none;
  }
  .toolbar .search-box input::placeholder { color: var(--text-secondary); }

  /* ── Filter ── */
  .filter-container { position: relative; }
  .filter-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
  .filter-btn.has-filter { color: var(--accent); border-color: var(--accent); }
  .filter-badge {
    display: none;
    min-width: 18px; height: 18px; line-height: 18px; text-align: center;
    font-size: 10px; font-weight: 600; background: var(--accent); color: #fff;
    border-radius: 9px; padding: 0 5px;
  }
  .filter-btn.has-filter .filter-badge { display: inline-block; }

  .filter-dropdown {
    display: none; position: absolute; top: 100%; right: 0; margin-top: 6px;
    background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 10px;
    width: 260px; z-index: 50; box-shadow: 0 12px 36px rgba(0,0,0,0.4);
    overflow: hidden;
  }
  .filter-dropdown.open { display: flex; flex-direction: column; }

  .filter-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--border-color);
  }
  .filter-panel-header span { font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .filter-clear-btn {
    font-size: 11px; color: var(--text-secondary); background: none; border: none;
    cursor: pointer; padding: 2px 6px; border-radius: 4px;
  }
  .filter-clear-btn:hover { color: var(--accent); background: var(--accent-subtle); }

  .filter-panel-body { max-height: 380px; overflow-y: auto; padding: 6px 0; }

  .filter-section-hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 14px 4px; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-secondary);
  }
  .filter-section-hdr .section-actions { display: flex; gap: 2px; }
  .filter-section-hdr .section-action {
    font-size: 10px; text-transform: none; letter-spacing: 0; font-weight: 400;
    color: var(--text-secondary); background: none; border: none; cursor: pointer;
    padding: 1px 5px; border-radius: 3px;
  }
  .filter-section-hdr .section-action:hover { color: var(--accent); background: var(--accent-subtle); }

  .filter-item {
    display: flex; align-items: center; gap: 10px; padding: 5px 14px;
    cursor: pointer; user-select: none;
  }
  .filter-item:hover { background: var(--accent-subtle); }
  .filter-check {
    width: 16px; height: 16px; flex-shrink: 0; border: 1.5px solid var(--border-color);
    border-radius: 4px; background: transparent; position: relative;
  }
  .filter-item.checked .filter-check { background: var(--accent); border-color: var(--accent); }
  .filter-item.checked .filter-check::after {
    content: ''; position: absolute; left: 4.5px; top: 1.5px; width: 5px; height: 9px;
    border: solid #fff; border-width: 0 1.5px 1.5px 0; transform: rotate(40deg);
  }
  .filter-item-label {
    font-size: 12.5px; color: var(--text-primary); flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .filter-item:not(.checked) .filter-item-label { color: var(--text-secondary); }
  .filter-item-count {
    font-size: 10px; color: var(--text-secondary); background: var(--bg-tertiary);
    padding: 1px 6px; border-radius: 8px; min-width: 20px; text-align: center;
  }
  .filter-divider { height: 1px; background: var(--border-color); margin: 4px 14px; }

  .theme-toggle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; background: transparent;
    border: 1px solid var(--border-color); border-radius: 6px;
    color: var(--text-secondary); cursor: pointer; font-size: 16px; transition: all 0.2s;
  }
  .theme-toggle:hover { background: var(--bg-tertiary); color: var(--text-primary); }
  .theme-toggle svg { width: 16px; height: 16px; }

  /* ── Stats Bar ── */
  .stats-bar {
    display: flex; align-items: center; gap: 24px; padding: 8px 20px;
    background: var(--bg-secondary); border-bottom: 1px solid var(--border-color);
    font-size: 12px; color: var(--text-secondary); flex-shrink: 0; flex-wrap: wrap;
  }
  .stats-bar .stat-item span { color: var(--text-primary); font-weight: 600; }

  /* ── Legend ── */
  .legend {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    font-size: 12px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-badge {
    width: 26px;
    height: 20px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
  }
  .legend-label { color: var(--text-secondary); }

  /* ── Matrix Container ── */
  .matrix-container {
    flex: 1;
    overflow: auto;
    padding: 0;
  }
  .matrix-container::-webkit-scrollbar { width: 8px; height: 8px; }
  .matrix-container::-webkit-scrollbar-track { background: var(--bg-primary); }
  .matrix-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

  /* ── Table ── */
  table {
    border-collapse: separate;
    border-spacing: 0;
    min-width: 100%;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 10;
  }

  th {
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: var(--text-secondary);
    white-space: nowrap;
    position: sticky;
    top: 0;
  }

  th.assignee-header {
    writing-mode: vertical-lr;
    text-orientation: mixed;
    transform: rotate(180deg);
    padding: 14px 8px;
    min-width: 44px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  th.assignee-header:hover { background: var(--accent-subtle); color: var(--text-primary); }
  th.assignee-header.highlighted { background: var(--accent-subtle); color: var(--accent); }

  th.task-header {
    text-align: left;
    min-width: 240px;
    position: sticky;
    left: 0;
    z-index: 11;
  }

  td {
    border: 1px solid var(--border-color);
    padding: 0;
    text-align: center;
    vertical-align: middle;
    height: 40px;
  }

  td.task-cell {
    text-align: left;
    padding: 8px 12px;
    background: var(--bg-secondary);
    position: sticky;
    left: 0;
    z-index: 2;
    white-space: nowrap;
  }

  td.raci-cell {
    width: 44px;
    min-width: 44px;
    cursor: default;
    transition: background 0.1s;
  }
  td.raci-cell:hover { background: var(--row-hover); }

  tr:hover td { background: var(--row-hover); }
  tr:hover td.task-cell { background: var(--bg-tertiary); }

  .raci-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 22px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .raci-R { background: #F44336; }
  .raci-A { background: #FF9800; }
  .raci-C { background: #2196F3; }
  .raci-I { background: #607D8B; }

  .task-name-cell {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .task-name-cell .color-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .task-name-cell .name {
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-name-cell .progress-text {
    font-size: 11px;
    color: var(--text-secondary);
    margin-left: auto;
    white-space: nowrap;
  }

  /* ── Group header row ── */
  tr.group-row td {
    background: var(--bg-tertiary);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
    padding: 6px 12px;
    text-align: left;
    cursor: pointer;
    user-select: none;
    position: sticky;
    left: 0;
  }
  tr.group-row:hover td { background: var(--accent-subtle); }

  .group-arrow {
    margin-right: 8px;
    font-size: 10px;
    display: inline-block;
    transition: transform 0.2s;
  }
  .group-arrow.collapsed { transform: rotate(-90deg); }

  /* ── Detail Panel ── */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    justify-content: flex-end;
  }
  .detail-overlay.open { display: flex; }

  .detail-panel {
    width: 360px;
    background: var(--bg-secondary);
    border-left: 1px solid var(--border-color);
    padding: 24px;
    overflow-y: auto;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

  .detail-panel h2 {
    font-size: 16px; margin-bottom: 20px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .detail-panel .close-btn {
    background: transparent; border: none; color: var(--text-secondary);
    font-size: 18px; cursor: pointer; padding: 2px 6px; border-radius: 4px;
  }
  .detail-panel .close-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }

  .detail-field { margin-bottom: 14px; }
  .detail-field label {
    display: block; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 4px;
  }
  .detail-field .value { font-size: 14px; }
  .detail-progress-bar {
    height: 8px; background: var(--progress-bg); border-radius: 4px;
    overflow: hidden; margin-top: 4px;
  }
  .detail-progress-bar .fill { height: 100%; border-radius: 4px; }
  .detail-deps { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .dep-tag {
    padding: 2px 8px; background: var(--bg-tertiary); border-radius: 4px;
    font-size: 11px; color: var(--text-secondary); border: 1px solid var(--border-color);
  }

  .raci-summary {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;
  }
  .raci-summary-item {
    display: flex; align-items: center; gap: 4px; font-size: 12px;
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>RACI Matrix</h1>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search tasks...">
  </div>
  <div class="filter-container">
    <button class="filter-btn" id="filterBtn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1.5 2h13L9.5 8.5V13l-3 1.5V8.5z"/></svg>
      Filter<span class="filter-badge" id="filterBadge">0</span>
    </button>
    <div class="filter-dropdown" id="filterDropdown"></div>
  </div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat-item">Tasks: <span id="statTotal">0</span></div>
  <div class="stat-item">Team Members: <span id="statMembers">0</span></div>
  <div class="stat-item">Groups: <span id="statGroups">0</span></div>
  <div class="stat-item">Assignments: <span id="statAssignments">0</span></div>
  <div class="stat-item">Avg Progress: <span id="statAvg">0%</span></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-badge raci-R">R</div><span class="legend-label">Responsible</span></div>
  <div class="legend-item"><div class="legend-badge raci-A">A</div><span class="legend-label">Accountable</span></div>
  <div class="legend-item"><div class="legend-badge raci-C">C</div><span class="legend-label">Consulted</span></div>
  <div class="legend-item"><div class="legend-badge raci-I">I</div><span class="legend-label">Informed</span></div>
</div>

<div class="matrix-container" id="matrixContainer">
  <table id="raciTable">
    <thead id="raciHead"></thead>
    <tbody id="raciBody"></tbody>
  </table>
</div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<script>
// ─── State ───
let tasks = [];
let filteredTasks = [];
let allAssignees = [];
let searchTerm = '';
let activeGroups = new Set();
let collapsedGroups = new Set();
let highlightedAssignee = null;

// ─── CSV Parsing (same as Gantt) ───
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase());
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const values = parseCSVLine(lines[i]);
    if (values.length < 4) continue;
    const row = {};
    headers.forEach((h, idx) => { row[h] = (values[idx] || '').trim(); });
    result.push({
      name: row.task || row.name || row.title || '',
      group: row.group || row.category || row.phase || 'Ungrouped',
      assignee: row.assignee || row.owner || row.resource || '',
      start: new Date(row.start || row.start_date || row.startdate || ''),
      end: new Date(row.end || row.end_date || row.enddate || row.finish || ''),
      progress: Math.min(100, Math.max(0, parseInt(row.progress || row.complete || '0', 10) || 0)),
      dependencies: (row.dependencies || row.deps || row.predecessors || '').split(';').map(s => s.trim()).filter(Boolean),
      color: null,
    });
  }
  return result.filter(t => t.name && !isNaN(t.start) && !isNaN(t.end));
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i + 1] === '"') { current += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { current += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { result.push(current); current = ''; }
      else { current += ch; }
    }
  }
  result.push(current);
  return result;
}

// ─── RACI Role Derivation ───

function buildRaciMap(tasks) {
  const taskByName = {};
  tasks.forEach(t => { taskByName[t.name] = t; });

  const raciMap = {}; // raciMap[taskName][assignee] = 'R'|'A'|'C'|'I'

  tasks.forEach(t => {
    if (!raciMap[t.name]) raciMap[t.name] = {};

    if (t.assignee) {
      raciMap[t.name][t.assignee] = 'R';
    }

    if (t.dependencies.length > 0) {
      const depTask = taskByName[t.dependencies[0]];
      if (depTask && depTask.assignee && depTask.assignee !== t.assignee) {
        if (!raciMap[t.name][depTask.assignee]) {
          raciMap[t.name][depTask.assignee] = 'A';
        }
      }
    }

    t.dependencies.slice(1).forEach(depName => {
      const depTask = taskByName[depName];
      if (depTask && depTask.assignee && !raciMap[t.name][depTask.assignee]) {
        raciMap[t.name][depTask.assignee] = 'I';
      }
    });
  });

  const groupMembers = {};
  tasks.forEach(t => {
    if (!groupMembers[t.group]) groupMembers[t.group] = new Set();
    if (t.assignee) groupMembers[t.group].add(t.assignee);
  });

  tasks.forEach(t => {
    const members = groupMembers[t.group];
    if (!members) return;
    let cCount = 0;
    members.forEach(m => {
      if (m !== t.assignee && !raciMap[t.name][m] && cCount < 2) {
        raciMap[t.name][m] = 'C';
        cCount++;
      }
    });
  });

  return raciMap;
}

// ─── Data ───
function loadTasks(data) {
  tasks = data;
  const groupColors = {};
  const palette = (function(){const a=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#2f7bbf';return Array(8).fill(a)})();
  let ci = 0;
  tasks.forEach(t => {
    if (!t.color) {
      if (!groupColors[t.group]) groupColors[t.group] = palette[ci++ % palette.length];
      t.color = groupColors[t.group];
    }
  });
  allAssignees = [...new Set(tasks.map(t => t.assignee).filter(Boolean))].sort();
  activeGroups = new Set(tasks.map(t => t.group));
  buildFilterDropdown();
  applyFilters();
}

function applyFilters() {
  filteredTasks = tasks.filter(t => {
    if (!activeGroups.has(t.group)) return false;
    if (searchTerm && !t.name.toLowerCase().includes(searchTerm) &&
        !t.group.toLowerCase().includes(searchTerm) &&
        !t.assignee.toLowerCase().includes(searchTerm)) return false;
    return true;
  });
  render();
}

// ─── Utilities ───
function sanitize(str) {
  if (!str) return '';
  const el = document.createElement('span');
  el.textContent = str;
  return el.innerHTML;
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function daysBetween(a, b) { return Math.round((b - a) / 86400000); }

// ─── Render ───
function render() {
  updateStats();
  renderMatrix();
}

function updateStats() {
  const total = filteredTasks.length;
  const members = new Set(filteredTasks.map(t => t.assignee).filter(Boolean)).size;
  const groups = new Set(filteredTasks.map(t => t.group)).size;
  const raciMap = buildRaciMap(filteredTasks);
  let assignments = 0;
  Object.values(raciMap).forEach(row => { assignments += Object.keys(row).length; });
  const avg = total ? Math.round(filteredTasks.reduce((s, t) => s + t.progress, 0) / total) : 0;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statMembers').textContent = members;
  document.getElementById('statGroups').textContent = groups;
  document.getElementById('statAssignments').textContent = assignments;
  document.getElementById('statAvg').textContent = avg + '%';
}

function renderMatrix() {
  const raciMap = buildRaciMap(filteredTasks);
  const visibleAssignees = allAssignees.filter(a => {
    return filteredTasks.some(t => raciMap[t.name] && raciMap[t.name][a]);
  });

  const head = document.getElementById('raciHead');
  head.innerHTML = '';
  const headerRow = document.createElement('tr');
  const thTask = document.createElement('th');
  thTask.className = 'task-header';
  thTask.textContent = 'Task';
  headerRow.appendChild(thTask);

  visibleAssignees.forEach(a => {
    const th = document.createElement('th');
    th.className = 'assignee-header';
    if (highlightedAssignee === a) th.classList.add('highlighted');
    th.textContent = a;
    th.addEventListener('click', () => {
      highlightedAssignee = highlightedAssignee === a ? null : a;
      renderMatrix();
    });
    headerRow.appendChild(th);
  });
  head.appendChild(headerRow);

  const body = document.getElementById('raciBody');
  body.innerHTML = '';

  const groups = {};
  filteredTasks.forEach(t => {
    if (!groups[t.group]) groups[t.group] = [];
    groups[t.group].push(t);
  });

  Object.keys(groups).sort().forEach(g => {
    const groupRow = document.createElement('tr');
    groupRow.className = 'group-row';
    const groupTd = document.createElement('td');
    groupTd.colSpan = visibleAssignees.length + 1;
    const collapsed = collapsedGroups.has(g);
    groupTd.innerHTML = `<span class="group-arrow ${collapsed ? 'collapsed' : ''}">&#9660;</span>${sanitize(g)} (${groups[g].length})`;
    groupTd.addEventListener('click', () => {
      if (collapsedGroups.has(g)) collapsedGroups.delete(g);
      else collapsedGroups.add(g);
      renderMatrix();
    });
    groupRow.appendChild(groupTd);
    body.appendChild(groupRow);

    if (collapsed) return;

    groups[g].forEach(t => {
      const tr = document.createElement('tr');
      const taskTd = document.createElement('td');
      taskTd.className = 'task-cell';
      taskTd.innerHTML = `
        <div class="task-name-cell">
          <span class="color-dot" style="background:${sanitize(t.color)}"></span>
          <span class="name" title="${sanitize(t.name)}">${sanitize(t.name)}</span>
          <span class="progress-text">${t.progress}%</span>
        </div>
      `;
      taskTd.style.cursor = 'pointer';
      taskTd.addEventListener('click', () => showDetail(t, raciMap));
      tr.appendChild(taskTd);

      visibleAssignees.forEach(a => {
        const td = document.createElement('td');
        td.className = 'raci-cell';
        if (highlightedAssignee === a) td.style.background = 'var(--accent-subtle)';
        const role = raciMap[t.name] ? raciMap[t.name][a] : null;
        if (role) {
          td.innerHTML = `<span class="raci-badge raci-${role}">${role}</span>`;
        }
        tr.appendChild(td);
      });

      body.appendChild(tr);
    });
  });
}

// ─── Detail Panel ───
function showDetail(t, raciMap) {
  const overlay = document.getElementById('detailOverlay');
  const panel = document.getElementById('detailPanel');
  overlay.classList.add('open');

  const duration = daysBetween(t.start, t.end) + 1;
  const deps = t.dependencies.length > 0
    ? t.dependencies.map(d => `<span class="dep-tag">${sanitize(d)}</span>`).join('')
    : '<span style="color:var(--text-secondary);font-size:13px">None</span>';

  const roles = raciMap[t.name] || {};
  const raciHtml = Object.entries(roles).map(([person, role]) =>
    `<div class="raci-summary-item"><span class="raci-badge raci-${role}" style="width:22px;height:18px;font-size:10px">${role}</span>${sanitize(person)}</div>`
  ).join('') || '<span style="color:var(--text-secondary);font-size:13px">None</span>';

  panel.innerHTML = `
    <h2>
      <span>${sanitize(t.name)}</span>
      <button class="close-btn" id="closeDetail">&times;</button>
    </h2>
    <div class="detail-field">
      <label>Group</label>
      <div class="value"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${sanitize(t.color)};vertical-align:middle;margin-right:6px"></span>${sanitize(t.group)}</div>
    </div>
    <div class="detail-field">
      <label>Assignee (Responsible)</label>
      <div class="value">${sanitize(t.assignee) || '—'}</div>
    </div>
    <div class="detail-field">
      <label>RACI Assignments</label>
      <div class="raci-summary">${raciHtml}</div>
    </div>
    <div class="detail-field">
      <label>Start Date</label>
      <div class="value">${formatDate(t.start)}</div>
    </div>
    <div class="detail-field">
      <label>End Date</label>
      <div class="value">${formatDate(t.end)}</div>
    </div>
    <div class="detail-field">
      <label>Duration</label>
      <div class="value">${duration} day${duration !== 1 ? 's' : ''}</div>
    </div>
    <div class="detail-field">
      <label>Progress</label>
      <div class="value">${t.progress}%</div>
      <div class="detail-progress-bar"><div class="fill" style="width:${t.progress}%;background:${sanitize(t.color)}"></div></div>
    </div>
    <div class="detail-field">
      <label>Dependencies</label>
      <div class="detail-deps">${deps}</div>
    </div>
  `;

  document.getElementById('closeDetail').addEventListener('click', () => {
    overlay.classList.remove('open');
  });
}

// ─── Filter Panel ───
function buildFilterDropdown() {
  const dropdown = document.getElementById('filterDropdown');
  const groups = [...new Set(tasks.map(t => t.group))].sort();
  const groupCounts = {};
  tasks.forEach(t => { groupCounts[t.group] = (groupCounts[t.group] || 0) + 1; });

  dropdown.innerHTML = '';

  const hdr = document.createElement('div');
  hdr.className = 'filter-panel-header';
  hdr.innerHTML = '<span>Filters</span>';
  const clearBtn = document.createElement('button');
  clearBtn.className = 'filter-clear-btn';
  clearBtn.textContent = 'Reset All';
  clearBtn.addEventListener('click', () => {
    groups.forEach(g => activeGroups.add(g));
    buildFilterDropdown();
    applyFilters();
  });
  hdr.appendChild(clearBtn);
  dropdown.appendChild(hdr);

  const body = document.createElement('div');
  body.className = 'filter-panel-body';

  const sHdr = document.createElement('div');
  sHdr.className = 'filter-section-hdr';
  sHdr.innerHTML = '<span>Groups</span>';
  const actions = document.createElement('span');
  actions.className = 'section-actions';
  const allBtn = document.createElement('button');
  allBtn.className = 'section-action';
  allBtn.textContent = 'All';
  allBtn.addEventListener('click', () => { groups.forEach(g => activeGroups.add(g)); buildFilterDropdown(); applyFilters(); });
  const noneBtn = document.createElement('button');
  noneBtn.className = 'section-action';
  noneBtn.textContent = 'None';
  noneBtn.addEventListener('click', () => { activeGroups.clear(); buildFilterDropdown(); applyFilters(); });
  actions.appendChild(allBtn);
  actions.appendChild(noneBtn);
  sHdr.appendChild(actions);
  body.appendChild(sHdr);

  groups.forEach(g => {
    const row = document.createElement('div');
    row.className = 'filter-item' + (activeGroups.has(g) ? ' checked' : '');
    row.innerHTML = `<span class="filter-check"></span><span class="filter-item-label">${sanitize(g)}</span><span class="filter-item-count">${groupCounts[g] || 0}</span>`;
    row.addEventListener('click', () => {
      if (activeGroups.has(g)) activeGroups.delete(g); else activeGroups.add(g);
      buildFilterDropdown(); applyFilters();
    });
    body.appendChild(row);
  });

  dropdown.appendChild(body);

  const btn = document.getElementById('filterBtn');
  const badge = document.getElementById('filterBadge');
  const hidden = groups.filter(g => !activeGroups.has(g)).length;
  btn.classList.toggle('has-filter', hidden > 0);
  badge.textContent = hidden;
}

// ─── Events ───
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  applyFilters();
});

document.getElementById('filterBtn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('filterDropdown').classList.toggle('open');
});

document.addEventListener('click', e => {
  if (!e.target.closest('.filter-container')) {
    document.getElementById('filterDropdown').classList.remove('open');
  }
  if (e.target.id === 'detailOverlay') {
    document.getElementById('detailOverlay').classList.remove('open');
  }
});

// ─── Theme ───
(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('gantt_theme') || 'dark'); })();

// ─── Init (same date offset logic as Gantt) ───
if (window.__GANTT_CSV__) {
  const data = parseCSV(window.__GANTT_CSV__);
  if (data.length > 0) {
    const minMs = Math.min(...data.map(t => t.start.getTime()));
    const maxMs = Math.max(...data.map(t => t.end.getTime()));
    const pointAt32 = minMs + (maxMs - minMs) * 0.32;
    const now = new Date(); now.setHours(0, 0, 0, 0);
    const shiftMs = now.getTime() - pointAt32;
    data.forEach(t => {
      t.start = new Date(t.start.getTime() + shiftMs);
      t.end = new Date(t.end.getTime() + shiftMs);
    });
    loadTasks(data);
  }
}

render();
</script>
</body>
</html>
